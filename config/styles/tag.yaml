name: "TAG"
display_name: "Tight-Aggressive"
description: "Plays few hands but plays them aggressively"
# VPIP: Voluntarily Put $ In Pot %
preflop_vpip: 0.22
preflop_pfr: 0.18
# Hand strength thresholds (0-1 scale)
open_threshold: 0.65
call_threshold: 0.55
reraise_threshold: 0.80
defend_bb_threshold: 0.45

# Preflop tendencies
preflop:
  fold_weight: 1.5
  check_weight: 0.5
  call_weight: 1.0
  bet_weight: 2.0
  raise_weight: 2.5
  all_in_weight: 0.3
  bluff_frequency: 0.05
  cbet_frequency: 0.0

# Flop tendencies
flop:
  fold_weight: 1.0
  check_weight: 0.8
  call_weight: 1.0
  bet_weight: 2.0
  raise_weight: 2.0
  all_in_weight: 0.3
  bluff_frequency: 0.15
  cbet_frequency: 0.70

# Turn tendencies
turn:
  fold_weight: 1.2
  check_weight: 1.0
  call_weight: 1.0
  bet_weight: 1.8
  raise_weight: 1.5
  all_in_weight: 0.3
  bluff_frequency: 0.10
  cbet_frequency: 0.55

# River tendencies
river:
  fold_weight: 1.0
  check_weight: 1.2
  call_weight: 1.2
  bet_weight: 1.5
  raise_weight: 1.5
  all_in_weight: 0.3
  bluff_frequency: 0.10
  cbet_frequency: 0.0

# Bet sizing as % of pot
small_bet_pct: 0.33
medium_bet_pct: 0.55
large_bet_pct: 0.75

# GTO 翻前数据结构
gto_preflop:
  # 开池范围（无人limp时）
  open_ranges:
    utg: ["AA", "KK", "QQ", "JJ", "TT", "AKs", "AKo", "AQs", "AJs"]
    mp: ["AA", "KK", "QQ", "JJ", "TT", "99", "AKs", "AQs", "AJs", "KQs"]
    co: ["AA", "KK", "QQ", "JJ", "TT", "99", "88", "77", "AKs", "AQs", "AJs", "ATs", "KQs", "KJs", "QJs", "JTs"]
    btn: ["AA", "KK", "QQ", "JJ", "TT", "99", "88", "77", "66", "55", "44", "33", "22", "AKs", "AQs", "AJs", "ATs", "A9s", "KQs", "KJs", "QJs", "JTs", "T9s", "98s"]
    sb: ["AA", "KK", "QQ", "JJ", "TT", "99", "88", "77", "66", "55", "AKs", "AQs", "AJs", "ATs", "KQs", "KJs", "QJs", "JTs"]

  # 开池尺度（BB）
  open_sizes:
    utg: [2.5, 3.0]
    mp: [2.2, 2.5]
    hijack: [2.0, 2.2]
    co: [2.0, 2.2]
    btn: [2.0, 2.2]
    sb: [3.0, 3.5]

  # 隔离加注尺度（BB = 基础 + 每limp者×每limp）
  iso_raise:
    base_bb: 2
    per_limp_bb: 1

  # 3-bet范围和尺度
  three_bet_range: ["AA", "KK", "QQ", "JJ", "TT", "AKs", "AKo", "AQs"]
  three_bet_size_mult: 3.0

  # 4-bet范围和尺度
  four_bet_range: ["AA", "KK", "QQ", "AKs", "AKo"]
  four_bet_size_mult: 2.5
