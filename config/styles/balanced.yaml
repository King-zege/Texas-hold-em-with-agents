name: "Balanced"
display_name: "Balanced / Reg"
description: "Reasonable mix of tight/loose and passive/aggressive, plays like a competent regular"
preflop_vpip: 0.28
preflop_pfr: 0.22
open_threshold: 0.55
call_threshold: 0.45
reraise_threshold: 0.70
defend_bb_threshold: 0.35

preflop:
  fold_weight: 1.0
  check_weight: 0.8
  call_weight: 1.2
  bet_weight: 1.5
  raise_weight: 1.8
  all_in_weight: 0.4
  bluff_frequency: 0.12
  cbet_frequency: 0.0

flop:
  fold_weight: 0.8
  check_weight: 0.9
  call_weight: 1.2
  bet_weight: 1.5
  raise_weight: 1.5
  all_in_weight: 0.4
  bluff_frequency: 0.20
  cbet_frequency: 0.60

turn:
  fold_weight: 1.0
  check_weight: 1.0
  call_weight: 1.2
  bet_weight: 1.3
  raise_weight: 1.2
  all_in_weight: 0.4
  bluff_frequency: 0.15
  cbet_frequency: 0.45

river:
  fold_weight: 0.9
  check_weight: 1.2
  call_weight: 1.3
  bet_weight: 1.2
  raise_weight: 1.0
  all_in_weight: 0.4
  bluff_frequency: 0.12
  cbet_frequency: 0.0

small_bet_pct: 0.33
medium_bet_pct: 0.55
large_bet_pct: 0.75

# GTO 翻前数据结构
gto_preflop:
  # 开池范围（无人limp时）
  open_ranges:
    utg: ["AA", "KK", "QQ", "JJ", "TT", "99", "AKs", "AQs", "AJs", "ATs", "AKo", "AJo", "KQs"]
    mp: ["AA", "KK", "QQ", "JJ", "TT", "99", "88", "AKs", "AQs", "AJs", "ATs", "A9s", "KQs", "KJs", "QJs", "JTs", "AKo", "AJo", "KJo"]
    co: ["AA", "KK", "QQ", "JJ", "TT", "99", "88", "77", "66", "55", "44", "33", "22", "AKs", "AQs", "AJs", "ATs", "A9s", "A8s", "KQs", "KJs", "QJs", "JTs", "T9s", "98s", "87s", "76s", "65s", "54s", "AKo", "AJo", "ATo", "KQo", "KJo", "QJo", "JTo"]
    btn: ["AA", "KK", "QQ", "JJ", "TT", "99", "88", "77", "66", "55", "44", "33", "22", "AsKs", "AsQs", "AsJs", "AsTs", "As9s", "As8s", "As7s", "As6s", "As5s", "As4s", "As3s", "As2s", "KsQs", "KsJs", "KsTs", "QsJs", "QsTs", "JsTs", "T9s", "98s", "87s", "76s", "65s", "54s", "AKo", "AJo", "ATo", "A9o", "KQo", "KJo", "KTo", "QJo", "QTo", "JTo"]
    sb: ["AA", "KK", "QQ", "JJ", "TT", "99", "88", "77", "66", "55", "44", "33", "22", "AKs", "AQs", "AJs", "ATs", "A9s", "A8s", "KQs", "KJs", "QJs", "JTs", "T9s", "98s", "87s", "76s", "65s", "54s", "AKo", "AJo", "ATo", "KQo", "KJo", "QJo", "JTo"]

  # 开池尺度（BB）
  open_sizes:
    utg: [2.5, 3.0]
    mp: [2.2, 2.5]
    hijack: [2.0, 2.2]
    co: [2.0, 2.2]
    btn: [2.0, 2.2]
    sb: [3.0, 3.5]

  # 隔离加注尺度（BB = 基础 + 每limp者×每limp）
  iso_raise:
    base_bb: 2
    per_limp_bb: 1

  # 3-bet范围和尺度
  three_bet_range: ["AA", "KK", "QQ", "JJ", "TT", "99", "AKs", "AQs", "AKo", "ATs", "AJs"]
  three_bet_size_mult: 3.0

  # 4-bet范围和尺度
  four_bet_range: ["AA", "KK", "QQ", "AKs", "AKo"]
  four_bet_size_mult: 2.5
