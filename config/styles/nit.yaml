name: "Nit"
display_name: "Nit (Ultra-Tight)"
description: "Extremely tight, only plays premium hands, rarely bluffs"
preflop_vpip: 0.12
preflop_pfr: 0.06
open_threshold: 0.85
call_threshold: 0.80
reraise_threshold: 0.95
defend_bb_threshold: 0.70

preflop:
  fold_weight: 3.0
  check_weight: 1.0
  call_weight: 0.8
  bet_weight: 0.5
  raise_weight: 0.3
  all_in_weight: 0.1
  bluff_frequency: 0.01
  cbet_frequency: 0.0

flop:
  fold_weight: 2.0
  check_weight: 1.0
  call_weight: 1.2
  bet_weight: 0.5
  raise_weight: 0.3
  all_in_weight: 0.1
  bluff_frequency: 0.02
  cbet_frequency: 0.60

turn:
  fold_weight: 2.5
  check_weight: 1.2
  call_weight: 1.0
  bet_weight: 0.4
  raise_weight: 0.2
  all_in_weight: 0.1
  bluff_frequency: 0.01
  cbet_frequency: 0.50

river:
  fold_weight: 2.0
  check_weight: 1.5
  call_weight: 1.0
  bet_weight: 0.3
  raise_weight: 0.2
  all_in_weight: 0.1
  bluff_frequency: 0.01
  cbet_frequency: 0.0

small_bet_pct: 0.33
medium_bet_pct: 0.50
large_bet_pct: 0.66

# GTO 翻前数据结构
gto_preflop:
  # 开池范围（无人limp时）
  open_ranges:
    utg: ["AA", "KK", "QQ", "JJ", "AKs", "AKo"]
    mp: ["AA", "KK", "QQ", "JJ", "TT", "AKs", "AQs", "AJs"]
    co: ["AA", "KK", "QQ", "JJ", "TT", "99", "AKs", "AQs", "AJs", "ATs", "KQs"]
    btn: ["AA", "KK", "QQ", "JJ", "TT", "99", "88", "AKs", "AQs", "AJs", "ATs", "KQs", "KJs", "QJs", "JTs"]
    sb: ["AA", "KK", "QQ", "JJ", "TT", "99", "88", "77", "AKs", "AQs", "AJs", "ATs", "KQs", "KJs", "QJs", "JTs", "T9s"]

  # 开池尺度（BB）
  open_sizes:
    utg: [2.5, 3.0]
    mp: [2.2, 2.5]
    hijack: [2.0, 2.2]
    co: [2.0, 2.2]
    btn: [2.0, 2.2]
    sb: [3.0, 3.5]

  # 隔离加注尺度（BB = 基础 + 每limp者×每limp）
  iso_raise:
    base_bb: 2
    per_limp_bb: 1

  # 3-bet范围和尺度
  three_bet_range: ["AA", "KK", "QQ", "JJ", "TT"]
  three_bet_size_mult: 3.0

  # 4-bet范围和尺度
  four_bet_range: ["AA", "KK"]
  four_bet_size_mult: 2.5
