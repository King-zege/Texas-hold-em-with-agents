name: "LAG"
display_name: "Loose-Aggressive"
description: "Plays many hands and is very aggressive, loves to steal blinds"
preflop_vpip: 0.45
preflop_pfr: 0.35
open_threshold: 0.40
call_threshold: 0.35
reraise_threshold: 0.60
defend_bb_threshold: 0.30

preflop:
  fold_weight: 0.5
  check_weight: 0.3
  call_weight: 1.5
  bet_weight: 2.5
  raise_weight: 3.0
  all_in_weight: 0.8
  bluff_frequency: 0.25
  cbet_frequency: 0.0

flop:
  fold_weight: 0.5
  check_weight: 0.4
  call_weight: 1.5
  bet_weight: 2.5
  raise_weight: 3.0
  all_in_weight: 0.8
  bluff_frequency: 0.35
  cbet_frequency: 0.85

turn:
  fold_weight: 0.6
  check_weight: 0.5
  call_weight: 1.5
  bet_weight: 2.5
  raise_weight: 2.5
  all_in_weight: 0.8
  bluff_frequency: 0.30
  cbet_frequency: 0.70

river:
  fold_weight: 0.5
  check_weight: 0.3
  call_weight: 1.2
  bet_weight: 2.0
  raise_weight: 2.0
  all_in_weight: 0.8
  bluff_frequency: 0.25
  cbet_frequency: 0.0

small_bet_pct: 0.50
medium_bet_pct: 0.75
large_bet_pct: 1.00

# GTO 翻前数据结构（宽于标准GTO）
gto_preflop:
  # 开池范围（无人limp时）- 比GTO宽20%
  open_ranges:
    utg: ["AA", "KK", "QQ", "JJ", "TT", "99", "88", "AKs", "AQs", "AJs", "ATs", "A9s", "AKo", "AJo", "KQs", "KJs"]
    mp: ["AA", "KK", "QQ", "JJ", "TT", "99", "88", "77", "66", "AKs", "AQs", "AJs", "ATs", "A9s", "A8s", "KQs", "KJs", "QJs", "JTs", "T9s", "98s", "AKo", "AJo", "ATo", "KQo", "KJo", "QJo"]
    co: ["AA", "KK", "QQ", "JJ", "TT", "99", "88", "77", "66", "55", "44", "33", "22", "AKs", "AQs", "AJs", "ATs", "A9s", "A8s", "A7s", "KQs", "KJs", "QJs", "JTs", "T9s", "98s", "87s", "76s", "65s", "54s", "43s", "32s", "AKo", "AJo", "ATo", "A9o", "A8o", "KQo", "KJo", "QJo", "JTo", "T9o"]
    btn: ["AA", "KK", "QQ", "JJ", "TT", "99", "88", "77", "66", "55", "44", "33", "22", "AsKs", "AsQs", "AsJs", "AsTs", "As9s", "As8s", "As7s", "As6s", "As5s", "As4s", "As3s", "As2s", "KsQs", "KsJs", "KsTs", "QsJs", "QsTs", "JsTs", "T9s", "98s", "87s", "76s", "65s", "54s", "43s", "32s", "AKo", "AJo", "ATo", "A9o", "KQo", "KJo", "KTo", "QJo", "QTo", "JTo", "T9o", "98o", "87o"]
    sb: ["AA", "KK", "QQ", "JJ", "TT", "99", "88", "77", "66", "55", "44", "33", "22", "AKs", "AQs", "AJs", "ATs", "A9s", "KQs", "KJs", "QJs", "JTs", "T9s", "98s", "87s", "76s", "65s", "54s", "AKo", "AJo", "ATo", "KQo", "KJo", "QJo", "JTo"]

  # 开池尺度（BB）
  open_sizes:
    utg: [2.5, 3.0]
    mp: [2.2, 2.5]
    hijack: [2.0, 2.2]
    co: [2.0, 2.2]
    btn: [2.0, 2.2]
    sb: [3.0, 3.5]

  # 隔离加注尺度（BB = 基础 + 每limp者×每limp）
  iso_raise:
    base_bb: 2
    per_limp_bb: 1

  # 3-bet范围和尺度（更激进）
  three_bet_range: ["AA", "KK", "QQ", "JJ", "TT", "99", "88", "77", "AKs", "AQs", "AJs", "ATs", "A9s", "AKo", "AJo", "ATo", "KQs", "KJs", "QJs"]
  three_bet_size_mult: 3.0

  # 4-bet范围和尺度
  four_bet_range: ["AA", "KK", "QQ", "JJ", "AKs", "AKo", "AQs"]
  four_bet_size_mult: 2.5
