name: "TP"
display_name: "Tight-Passive"
description: "Plays few hands and plays passively (calls more than raises)"
preflop_vpip: 0.18
preflop_pfr: 0.08
open_threshold: 0.70
call_threshold: 0.60
reraise_threshold: 0.85
defend_bb_threshold: 0.50

preflop:
  fold_weight: 2.0
  check_weight: 1.0
  call_weight: 2.0
  bet_weight: 0.8
  raise_weight: 0.5
  all_in_weight: 0.1
  bluff_frequency: 0.02
  cbet_frequency: 0.0

flop:
  fold_weight: 1.5
  check_weight: 1.5
  call_weight: 2.0
  bet_weight: 0.8
  raise_weight: 0.5
  all_in_weight: 0.1
  bluff_frequency: 0.05
  cbet_frequency: 0.40

turn:
  fold_weight: 1.8
  check_weight: 1.5
  call_weight: 1.5
  bet_weight: 0.6
  raise_weight: 0.3
  all_in_weight: 0.1
  bluff_frequency: 0.03
  cbet_frequency: 0.30

river:
  fold_weight: 2.0
  check_weight: 1.8
  call_weight: 1.5
  bet_weight: 0.5
  raise_weight: 0.3
  all_in_weight: 0.1
  bluff_frequency: 0.02
  cbet_frequency: 0.0

small_bet_pct: 0.25
medium_bet_pct: 0.40
large_bet_pct: 0.55

# GTO 翻前数据结构（紧于GTO）
gto_preflop:
  # 开池范围（无人limp时）
  open_ranges:
    utg: ["AA", "KK", "QQ", "JJ", "TT", "AKs", "AKo", "AQs"]
    mp: ["AA", "KK", "QQ", "JJ", "TT", "99", "AKs", "AQs", "AJs", "KQs"]
    co: ["AA", "KK", "QQ", "JJ", "TT", "99", "88", "77", "AKs", "AQs", "AJs", "ATs", "KQs", "KJs", "QJs", "JTs", "AKo", "AJo", "KQo"]
    btn: ["AA", "KK", "QQ", "JJ", "TT", "99", "88", "77", "66", "55", "44", "33", "22", "AKs", "AQs", "AJs", "ATs", "A9s", "KQs", "KJs", "QJs", "JTs", "T9s", "98s", "87s", "76s", "65s", "54s", "AKo", "AJo", "ATo", "KQo", "KJo", "QJo", "JTo"]
    sb: ["AA", "KK", "QQ", "JJ", "TT", "99", "88", "77", "66", "55", "44", "33", "22", "AKs", "AQs", "AJs", "ATs", "A9s", "KQs", "KJs", "QJs", "JTs", "T9s", "98s", "87s", "76s", "65s", "54s", "AKo", "AJo", "ATo", "KQo", "KJo", "QJo", "JTo"]

  # 开池尺度（BB）
  open_sizes:
    utg: [2.5, 3.0]
    mp: [2.2, 2.5]
    hijack: [2.0, 2.2]
    co: [2.0, 2.2]
    btn: [2.0, 2.2]
    sb: [3.0, 3.5]

  # 隔离加注尺度（BB = 基础 + 每limp者×每limp）
  iso_raise:
    base_bb: 2
    per_limp_bb: 1

  # 3-bet范围和尺度
  three_bet_range: ["AA", "KK", "QQ", "JJ", "TT", "AKs", "AKo"]
  three_bet_size_mult: 3.0

  # 4-bet范围和尺度
  four_bet_range: ["AA", "KK", "QQ", "AKs", "AKo"]
  four_bet_size_mult: 2.5
